<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="datasets.title">SynthAI - Generated Data Dashboard</title>
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; border-radius: 10px; padding: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid #2E7D32; }
        .stat-card .stat-val { font-size: 1.5rem; font-weight: 700; color: #1B5E20; }
        .stat-card .stat-label { font-size: 0.78rem; color: #999; margin-top: 0.15rem; }
        .filter-bar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
        .filter-bar input, .filter-bar select { padding: 0.5rem 0.75rem; border: 1px solid #E0E0E0; border-radius: 6px; font-size: 0.85rem; }
        .filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: #2E7D32; }
        .filter-bar .search-input { flex: 1; min-width: 160px; }
        .gen-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .gen-table th { background: #F5F7F5; padding: 0.65rem 0.75rem; text-align: left; font-weight: 600; color: #666; border-bottom: 2px solid #E0E0E0; white-space: nowrap; }
        .gen-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #F0F0F0; }
        .gen-table tr:hover td { background: #F9FDF9; }
        .gen-table .actions-cell { display: flex; gap: 0.35rem; flex-wrap: nowrap; }
        .gen-table .actions-cell button, .gen-table .actions-cell a { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; text-decoration: none; cursor: pointer; border: 1px solid #E0E0E0; background: white; color: #333; white-space: nowrap; }
        .gen-table .actions-cell button:hover, .gen-table .actions-cell a:hover { border-color: #2E7D32; color: #2E7D32; }
        .gen-table .file-link { color: #1565C0; text-decoration: none; font-family: 'Courier New', monospace; font-size: 0.78rem; cursor: pointer; }
        .gen-table .file-link:hover { text-decoration: underline; }
        .pagination-bar { display: flex; justify-content: center; align-items: center; gap: 0.4rem; margin-top: 1rem; flex-wrap: wrap; }
        .pagination-bar button { padding: 0.35rem 0.7rem; border: 1px solid #E0E0E0; background: white; border-radius: 4px; cursor: pointer; font-size: 0.82rem; }
        .pagination-bar button.active { background: #2E7D32; color: white; border-color: #2E7D32; }
        .pagination-bar button:disabled { opacity: 0.4; cursor: default; }
        .pagination-bar .page-info { font-size: 0.8rem; color: #999; margin-left: 0.5rem; }
        .preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .preview-modal.active { display: flex; }
        .preview-modal-content { background: white; border-radius: 12px; max-width: 900px; width: 92%; max-height: 82vh; overflow: auto; padding: 1.5rem; }
        .preview-modal-content h3 { margin-bottom: 0.5rem; }
        .preview-modal-content .close-modal { float: right; cursor: pointer; font-size: 1.3rem; color: #999; line-height: 1; }
        .preview-modal-content .close-modal:hover { color: #333; }
        .preview-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .preview-table th { background: #F5F7F5; padding: 0.45rem 0.5rem; text-align: left; font-weight: 600; color: #666; border-bottom: 1px solid #E0E0E0; white-space: nowrap; }
        .preview-table td { padding: 0.35rem 0.5rem; border-bottom: 1px solid #F0F0F0; }
        .model-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.78rem; font-weight: 500; background: #E8F5E9; color: #2E7D32; }
        .version-badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.72rem; background: #FFF8E1; color: #E65100; font-weight: 600; }
        .empty-state { text-align: center; padding: 3rem 1rem; color: #999; }
        .empty-state svg { width: 48px; height: 48px; fill: #E0E0E0; margin-bottom: 0.75rem; }
        .empty-state p { font-size: 0.95rem; }
        .empty-state a { color: #2E7D32; }
        .level-tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.72rem; font-weight: 600; }
        .btn-eval { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; cursor: pointer; border: 1px solid #E0E0E0; background: white; color: #1565C0; text-decoration: none; white-space: nowrap; }
        .btn-eval:hover { border-color: #1565C0; background: #E3F2FD; }
        /* Ownership badge styles */
        .owner-badge { display: inline-block; padding: 0.1rem 0.45rem; border-radius: 3px; font-size: 0.7rem; font-weight: 600; margin-left: 0.35rem; vertical-align: middle; }
        .owner-badge.own { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }
        .owner-badge.admin { background: #E3F2FD; color: #1565C0; border: 1px solid #BBDEFB; }
        .owner-badge.other { background: #FFEBEE; color: #C62828; border: 1px solid #FFCDD2; }
        .btn-disabled { opacity: 0.45; cursor: not-allowed !important; pointer-events: none; }
        .permission-note { background: #FFF8E1; border-left: 3px solid #FFA000; padding: 0.6rem 0.85rem; border-radius: 4px; font-size: 0.82rem; color: #5D4037; margin-bottom: 1rem; }
        /* Augmented level tag */
        .level-tag.augmented { background: #F3E5F5; color: #7B1FA2; border: 1px solid #CE93D8; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand"><img src="logo.png" alt="SynthAI" class="sidebar-logo"><h1 data-i18n="app.name">SynthAI</h1><p data-i18n="app.tagline">Smart Agricultural Platform</p></div>
            <div id="user-panel"></div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div style="padding: 1rem; margin-top: 2rem;"><button id="logout-btn" class="btn btn-outline" style="width: 100%; border-color: rgba(255,255,255,0.2); color: white;" data-i18n="logout">Logout</button></div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h2 data-i18n="datasets.title">Generated Data Dashboard</h2>
                <p data-i18n="datasets.subtitle">Browse, preview, and download all synthetic datasets generated from your models</p>
            </div>

            <div class="dashboard-stats" id="dashboard-stats"></div>
            <div id="status-msg"></div>

            <div id="permission-note" class="permission-note" style="display:none;"></div>

            <div class="card">
                <div class="filter-bar">
                    <input type="text" class="search-input" id="search-input" placeholder="Search by model name..." data-i18n="datasets.search">
                    <select id="size-filter">
                        <option value="all" data-i18n="datasets.all_sizes">All Sizes</option>
                        <option value="Medium">Medium</option>
                        <option value="Large">Large</option>
                        <option value="Big Data">Big Data</option>
                        <option value="Augmented">Augmented</option>
                    </select>
                    <select id="sort-select">
                        <option value="newest" data-i18n="datasets.newest">Newest First</option>
                        <option value="oldest" data-i18n="datasets.oldest">Oldest First</option>
                        <option value="rows-desc" data-i18n="datasets.most_rows">Most Rows</option>
                        <option value="rows-asc" data-i18n="datasets.fewest_rows">Fewest Rows</option>
                    </select>
                </div>

                <div class="table-container">
                    <table class="gen-table">
                        <thead>
                            <tr>
                                <th data-i18n="table.model_name">Model Name</th>
                                <th>Version Number</th>
                                <th data-i18n="generate.dataset_size">Size</th>
                                <th data-i18n="table.rows">Rows</th>
                                <th data-i18n="table.created">Date</th>
                                <th>Time</th>
                                <th data-i18n="table.actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="datasets-tbody"></tbody>
                    </table>
                </div>
                <div id="empty-state" class="empty-state" style="display:none;"></div>
                <div class="pagination-bar" id="pagination-bar"></div>
            </div>
        </main>
    </div>

    <!-- Preview Modal -->
    <div class="preview-modal" id="preview-modal">
        <div class="preview-modal-content">
            <span class="close-modal" id="close-modal">&times;</span>
            <h3>Data Preview <span id="preview-title" style="font-size:0.85rem;color:#999;font-weight:400;"></span></h3>
            <div id="preview-table-container" style="overflow-x:auto;">
                <table class="preview-table" id="preview-table">
                    <thead id="preview-thead"></thead>
                    <tbody id="preview-tbody"></tbody>
                </table>
            </div>
            <p id="preview-footer" style="font-size:0.78rem;color:#999;margin-top:0.75rem;"></p>
        </div>
    </div>
    <script src="../js/services/i18n.js"></script>
    <script src="../js/services/auth.js"></script>
    <script src="../js/services/model.js"></script>
    <script src="../js/services/data.js"></script>
    <script src="../js/services/history.js"></script>
    <script src="../js/app.js"></script>
    <script>
        (function() {
            var btn = document.getElementById('logout-btn');
            if (btn) {
                btn.addEventListener('click', function() {
                    try { AuthService.logout(); } catch (e) { sessionStorage.clear(); }
                    window.location.href = '/pages/login.html';
                });
            }
        })();

        // Global user reference (set inside DOMContentLoaded)
        var _currentUser = null;
        var _isAdmin = false;

        document.addEventListener('DOMContentLoaded', function() {
            try {
                var user = AuthService.getCurrentUser();
                if (!user) { window.location.href = '/pages/login.html'; return; }
                _currentUser = user;
                _isAdmin = (user.role === 'admin');
            } catch (e) { window.location.href = '/pages/login.html'; return; }

            try { App.setupSidebar();
try { App.setupLanguageSwitcher(); } catch (e) {} } catch (e) {}
            try { App.setupUserPanel(); } catch (e) {}

            function _t(k) { return typeof I18nService !== 'undefined' && I18nService.t ? I18nService.t(k) : k; }

            // Show permission note for non-admin users
            if (!_isAdmin) {
                var note = document.getElementById('permission-note');
                note.style.display = 'block';
                note.innerHTML = '<strong>&#128274; Limited Access:</strong> You can only see, export, and delete datasets that you generated yourself (including augmented datasets). Admin sees all datasets.';
            }

            var currentPage = 1;
            var perPage = 10;
            var allDatasets = [];
            var filteredDatasets = [];

            /**
             * Filter datasets by ownership.
             * Admin -> sees everything
             * Company/Farmer -> sees ONLY datasets where g.userId === user.id
             * Works for both generated and augmented datasets (both have userId tagged).
             */
            function filterByOwnership(datasets) {
                if (_isAdmin) return datasets;
                var uid = _currentUser ? (_currentUser.id || _currentUser.username) : null;
                if (!uid) return [];
                return datasets.filter(function(g) {
                    return g.userId !== undefined && g.userId !== null && g.userId !== '' && String(g.userId) === String(uid);
                });
            }

            /**
             * Check if the current user can modify (export/delete) a dataset.
             */
            function canModify(g) {
                if (_isAdmin) return true;
                var uid = _currentUser ? (_currentUser.id || _currentUser.username) : null;
                if (!uid) return false;
                return g.userId !== undefined && g.userId !== null && String(g.userId) === String(uid);
            }

            /**
             * Returns an ownership badge for the dataset row.
             */
            function ownershipBadge(g) {
                if (_isAdmin) {
                    if (g.userId === undefined || g.userId === null || g.userId === '') {
                        return '<span class="owner-badge admin">Admin (legacy)</span>';
                    }
                    if (_currentUser && String(g.userId) === String(_currentUser.id || _currentUser.username)) {
                        return '<span class="owner-badge own">Yours</span>';
                    }
                    return '<span class="owner-badge admin">Shared</span>';
                }
                return '<span class="owner-badge own">Yours</span>';
            }

            /**
             * Normalize an augmentation entry so it can be displayed alongside
             * generation entries in the same table.
             */
            function normalizeAugmentation(aug) {
                var totalRows = aug.augmentedRows || (aug.preview ? aug.preview.totalRows : 0) || 0;
                var fileName = aug.fileName || ('Augmented ' + (aug.type || 'Dataset'));
                return {
                    id: aug.id,
                    userId: aug.userId,
                    userRole: aug.userRole,
                    userUsername: aug.userUsername,
                    modelName: fileName,
                    modelVersion: 'x' + (aug.multiplier || 1),
                    level: 'Augmented',
                    rows: totalRows,
                    date: aug.dateStr || new Date(aug.createdAt || Date.now()).toISOString(),
                    timestamp: aug.createdAt || (aug.dateStr ? new Date(aug.dateStr).getTime() : Date.now()),
                    preview: aug.preview,
                    type: aug.type,
                    qualityScore: aug.qualityScore,
                    _isAugmentation: true,
                    _multiplier: aug.multiplier
                };
            }

            function loadData() {
                var rawGens = [];
                var rawAugs = [];

                try { rawGens = DataService.getGenerations() || []; } catch (e) { rawGens = []; }
                try {
                    if (DataService.getAugmentations) {
                        rawAugs = DataService.getAugmentations() || [];
                    }
                } catch (e) { rawAugs = []; }

                var normalizedAugs = rawAugs.map(normalizeAugmentation);
                var localRaw = rawGens.concat(normalizedAugs);

                var useApi = typeof ApiService !== 'undefined' && ApiService.isAvailable();
                if (useApi) {
                    ApiService.getDatasets().then(function(apiDatasets) {
                        var apiMapped = (apiDatasets || []).map(function(d) {
                            return {
                                id: 'api_' + d.id,
                                modelName: 'Backend #' + d.id,
                                rows: d.rows_generated,
                                level: 'N/A',
                                date: d.created_at,
                                timestamp: new Date(d.created_at).getTime(),
                                _apiId: d.id,
                                _fromBackend: true
                            };
                        });
                        allDatasets = filterByOwnership(localRaw.concat(apiMapped));
                        renderDashboard();
                        applyFilters();
                    }).catch(function() {
                        allDatasets = filterByOwnership(localRaw);
                        renderDashboard();
                        applyFilters();
                    });
                } else {
                    try {
                        allDatasets = filterByOwnership(localRaw);
                    } catch (e) { allDatasets = []; }
                    renderDashboard();
                    applyFilters();
                }
            }

            function renderDashboard() {
                var totalGens = allDatasets.length;
                var totalRows = allDatasets.reduce(function(s, g) { return s + (g.rows || 0); }, 0);
                var fromModels = allDatasets.filter(function(g) { return g.modelName; }).length;
                var augCount = allDatasets.filter(function(g) { return g._isAugmentation; }).length;

                document.getElementById('dashboard-stats').innerHTML =
                    '<div class="stat-card"><div class="stat-val">' + totalGens + '</div><div class="stat-label">' + _t('datasets.total_generations') + '</div></div>' +
                    '<div class="stat-card"><div class="stat-val">' + totalRows.toLocaleString() + '</div><div class="stat-label">' + _t('datasets.total_rows') + '</div></div>' +
                    '<div class="stat-card" style="border-left-color:#7B1FA2;"><div class="stat-val">' + augCount + '</div><div class="stat-label">Augmented</div></div>' +
                    '<div class="stat-card" style="border-left-color:#FF9800;"><div class="stat-val">' + (totalGens > 0 ? Math.round(totalRows / totalGens).toLocaleString() : 0) + '</div><div class="stat-label">' + _t('datasets.avg_rows') + '</div></div>';

                applyFilters();
            }

            function applyFilters() {
                var query = document.getElementById('search-input').value.toLowerCase().trim();
                var sizeFilter = document.getElementById('size-filter').value;
                var sort = document.getElementById('sort-select').value;

                filteredDatasets = allDatasets.filter(function(g) {
                    if (query) {
                        if (!g.modelName || g.modelName.toLowerCase().indexOf(query) === -1) return false;
                    }
                    if (sizeFilter !== 'all' && g.level !== sizeFilter) return false;
                    return true;
                });

                filteredDatasets.sort(function(a, b) {
                    switch (sort) {
                        case 'oldest': return (a.timestamp || 0) - (b.timestamp || 0);
                        case 'rows-desc': return (b.rows || 0) - (a.rows || 0);
                        case 'rows-asc': return (a.rows || 0) - (b.rows || 0);
                        default: return (b.timestamp || 0) - (a.timestamp || 0);
                    }
                });

                currentPage = 1;
                renderTable();
            }

            function renderTable() {
                var tbody = document.getElementById('datasets-tbody');
                var emptyEl = document.getElementById('empty-state');
                var pagination = document.getElementById('pagination-bar');

                if (filteredDatasets.length === 0) {
                    tbody.innerHTML = '';
                    emptyEl.style.display = 'block';
                    var msg = _t('datasets.no_results');
                    if (!_isAdmin && allDatasets.length === 0) {
                        msg = 'You have no datasets yet. Generate your first dataset to see it here.';
                    }
                    emptyEl.innerHTML = '<p>' + msg + '</p>' +
                        (allDatasets.length === 0 ? '<p style="margin-top:0.5rem;"><a href="generate_data.html">' + _t('datasets.generate_first') + '</a></p>' : '');
                    pagination.innerHTML = '';
                    return;
                }
                emptyEl.style.display = 'none';

                var start = (currentPage - 1) * perPage;
                var pageData = filteredDatasets.slice(start, start + perPage);

                var levelClasses = { 'Medium': 'badge-free', 'Large': 'badge-warning', 'Big Data': 'badge-premium', 'Augmented': 'augmented' };

                tbody.innerHTML = pageData.map(function(g) {
                    var d = new Date(g.date || g.timestamp);
                    var dateStr = d.toLocaleDateString();
                    var timeStr = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    var modelName = g.modelName || 'Standalone';
                    var modelVer = g.modelVersion || '-';
                    var levelClass = levelClasses[g.level] || 'badge-free';

                    var canEdit = canModify(g);

                    var previewBtn = '<button onclick="previewGeneration(' + g.id + ')" title="' + _t('action.preview') + '">' + _t('action.preview') + '</button>';

                    // Evaluate page only makes sense for generations (not augmentations)
                    var evalBtn;
                    if (g._isAugmentation) {
                        evalBtn = '<button disabled class="btn-disabled" title="Evaluation not available for augmented datasets">Evaluate</button>';
                    } else {
                        evalBtn = '<a href="data_evaluation.html?id=' + g.id + '" class="btn-eval" title="' + _t('action.evaluate') + '">' + _t('action.evaluate') + '</a>';
                    }

                    var exportBtn;
                    if (canEdit) {
                        exportBtn = '<button onclick="exportGeneration(' + g.id + ')" title="' + _t('action.export') + '">' + _t('action.export') + '</button>';
                    } else {
                        exportBtn = '<button disabled class="btn-disabled" title="You can only export your own datasets">' + _t('action.export') + '</button>';
                    }

                    var deleteBtn;
                    if (g._fromBackend) {
                        deleteBtn = '';
                    } else if (canEdit) {
                        deleteBtn = '<button onclick="deleteGeneration(' + g.id + ')" style="color:#C62828;border-color:#FFCDD2;" title="' + _t('action.delete') + '">' + _t('action.delete') + '</button>';
                    } else {
                        deleteBtn = '<button disabled class="btn-disabled" style="color:#C62828;border-color:#FFCDD2;" title="You can only delete your own datasets">' + _t('action.delete') + '</button>';
                    }

                    var actions = '<div class="actions-cell">' + previewBtn + evalBtn + exportBtn + deleteBtn + '</div>';

                    return '<tr>' +
                        '<td><span class="model-badge">' + modelName + '</span>' + ownershipBadge(g) + '</td>' +
                        '<td><span class="version-badge">v' + modelVer + '</span></td>' +
                        '<td><span class="level-tag ' + levelClass + '">' + (g.level || 'Medium') + '</span></td>' +
                        '<td><strong>' + (g.rows || 0).toLocaleString() + '</strong></td>' +
                        '<td>' + dateStr + '</td>' +
                        '<td>' + timeStr + '</td>' +
                        '<td>' + actions + '</td></tr>';
                }).join('');

                var totalPages = Math.ceil(filteredDatasets.length / perPage);
                if (totalPages <= 1) {
                    pagination.innerHTML = '<span class="page-info">' + filteredDatasets.length + ' ' + _t('pagination.entries') + '</span>';
                } else {
                    var ph = '<button data-page="prev" ' + (currentPage === 1 ? 'disabled' : '') + '>&larr; ' + _t('pagination.prev') + '</button>';
                    for (var i = 1; i <= totalPages; i++) {
                        ph += '<button class="' + (i === currentPage ? 'active' : '') + '" data-page="' + i + '">' + i + '</button>';
                    }
                    ph += '<button data-page="next" ' + (currentPage === totalPages ? 'disabled' : '') + '>' + _t('pagination.next') + ' &rarr;</button>';
                    ph += '<span class="page-info">' + _t('pagination.page') + ' ' + currentPage + ' ' + _t('pagination.of') + ' ' + totalPages + ' (' + filteredDatasets.length + ' ' + _t('dashboard.total') + ')</span>';
                    pagination.innerHTML = ph;
                }
            }

            // Event handlers
            document.getElementById('search-input').addEventListener('input', applyFilters);
            document.getElementById('size-filter').addEventListener('change', applyFilters);
            document.getElementById('sort-select').addEventListener('change', applyFilters);

            document.getElementById('pagination-bar').addEventListener('click', function(e) {
                if (e.target.dataset.page) {
                    var totalPages = Math.ceil(filteredDatasets.length / perPage);
                    if (e.target.dataset.page === 'prev' && currentPage > 1) currentPage--;
                    else if (e.target.dataset.page === 'next' && currentPage < totalPages) currentPage++;
                    else if (e.target.dataset.page !== 'prev' && e.target.dataset.page !== 'next') currentPage = parseInt(e.target.dataset.page);
                    else return;
                    renderTable();
                }
            });

            // Preview modal
            document.getElementById('close-modal').addEventListener('click', function() {
                document.getElementById('preview-modal').classList.remove('active');
            });
            document.getElementById('preview-modal').addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('active');
            });

            loadData();
        });

        function _t(key) {
            return typeof I18nService !== 'undefined' && I18nService.t ? I18nService.t(key) : key;
        }

        /**
         * Look up a dataset by ID across both generations and augmentations.
         * Returns { type: 'generation'|'augmentation', data: <entry> } or null.
         */
        function lookupDataset(id) {
            // Try augmentation first
            try {
                if (DataService.getAugmentationById) {
                    var aug = DataService.getAugmentationById(id);
                    if (aug) return { type: 'augmentation', data: aug };
                }
            } catch (e) { /* ignore */ }

            // Fall back to generation
            try {
                var gen = DataService.getGenerationById(id);
                if (gen) return { type: 'generation', data: gen };
            } catch (e) { /* ignore */ }

            return null;
        }

        // Global functions for button handlers
        function previewGeneration(id) {
            var lookup = lookupDataset(id);
            if (!lookup) { alert(_t('empty.no_data')); return; }

            var headers, previewRows, totalRows, modelName;

            if (lookup.type === 'augmentation') {
                var aug = lookup.data;
                var fullData = [];
                try {
                    if (DataService.getAugmentationFullData) {
                        fullData = DataService.getAugmentationFullData(id) || [];
                    }
                } catch (e) { fullData = []; }
                if (fullData.length === 0 && aug.preview && Array.isArray(aug.preview.data)) {
                    fullData = aug.preview.data;
                }
                previewRows = fullData.slice(0, 10);
                if (previewRows.length === 0) { alert(_t('empty.no_data')); return; }
                headers = aug.headers || (aug.preview ? aug.preview.headers : Object.keys(previewRows[0] || {}));
                totalRows = aug.augmentedRows || (aug.preview ? aug.preview.totalRows : fullData.length);
                modelName = aug.fileName || ('Augmented ' + (aug.type || 'Dataset'));
            } else {
                var gen = lookup.data;
                previewRows = DataService.getGenerationPreviewRows(id, 10);
                if (!previewRows || previewRows.length === 0) { alert(_t('empty.no_data')); return; }
                var preview = gen.preview;
                headers = preview ? preview.headers : Object.keys(previewRows[0]);
                totalRows = gen.rows || 0;
                modelName = gen.modelName || 'Standalone';
            }

            document.getElementById('preview-title').textContent = '(' + modelName + ' - first ' + previewRows.length + ' of ' + totalRows + ' rows)';

            var thead = document.getElementById('preview-thead');
            thead.innerHTML = '<tr>' + headers.map(function(h) { return '<th>' + h + '</th>'; }).join('') + '</tr>';

            var tbody = document.getElementById('preview-tbody');
            tbody.innerHTML = previewRows.map(function(row) {
                return '<tr>' + headers.map(function(h) {
                    var val = row[h];
                    if (val === undefined || val === null) val = '';
                    if (typeof val === 'number') val = val.toFixed ? val.toFixed(2) : val;
                    return '<td>' + val + '</td>';
                }).join('') + '</tr>';
            }).join('');

            document.getElementById('preview-footer').textContent = 'Showing ' + previewRows.length + ' preview rows. Full dataset: ' + totalRows.toLocaleString() + ' rows.';
            document.getElementById('preview-modal').classList.add('active');
        }

        function exportGeneration(id) {
            var user = AuthService.getCurrentUser();
            var lookup = lookupDataset(id);
            if (!lookup) { alert('Dataset not found.'); return; }
            var item = lookup.data;
            if (user.role !== 'admin') {
                var uid = user.id || user.username;
                if (!item.userId || String(item.userId) !== String(uid)) {
                    alert('⛔ Permission denied: You can only export datasets that you generated yourself.');
                    return;
                }
            }
            var ok = false;
            if (lookup.type === 'augmentation') {
                try {
                    if (DataService.exportAugmentation) {
                        ok = DataService.exportAugmentation(id);
                    } else {
                        alert('Export not available for augmented datasets in this version.');
                        return;
                    }
                } catch (e) { ok = false; }
            } else {
                ok = DataService.exportGeneration(id);
            }
            if (!ok) alert(_t('datasets.export_failed'));
        }

        function deleteGeneration(id) {
            var user = AuthService.getCurrentUser();
            var lookup = lookupDataset(id);
            if (!lookup) { alert('Dataset not found.'); return; }
            var item = lookup.data;
            if (user.role !== 'admin') {
                var uid = user.id || user.username;
                if (!item.userId || String(item.userId) !== String(uid)) {
                    alert('⛔ Permission denied: You can only delete datasets that you generated yourself.');
                    return;
                }
            }
            if (!confirm(_t('confirm.delete_dataset'))) return;

            if (lookup.type === 'augmentation') {
                try {
                    if (DataService.deleteAugmentation) {
                        DataService.deleteAugmentation(id);
                    } else {
                        // Manual fallback
                        var augs = JSON.parse(localStorage.getItem('synthai_augmentations') || '[]');
                        augs = augs.filter(function(a) { return String(a.id) !== String(id); });
                        localStorage.setItem('synthai_augmentations', JSON.stringify(augs));
                    }
                } catch (e) { console.error('Failed to delete augmentation:', e); }
                location.reload();
                return;
            }

            var gens = DataService.getGenerations().filter(function(g) { return g.id !== id; });
            localStorage.setItem('synthai_generations', JSON.stringify(gens));
            if (window.DataService && DataService.revokeCloudUrl) {
                if (item && item.fileUrl) DataService.revokeCloudUrl(item.fileUrl);
            }
            location.reload();
        }

        // Expose handlers to inline onclick attributes
        window.previewGeneration = previewGeneration;
        window.exportGeneration = exportGeneration;
        window.deleteGeneration = deleteGeneration;
    </script>
<script>if (typeof I18nService !== 'undefined') I18nService.translatePage();</script>
</body>
