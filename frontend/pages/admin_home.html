<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthAI - Admin Dashboard</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand"><h1>SynthAI</h1><p>Smart Agricultural Intelligence</p></div>
            <div id="user-panel"></div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div style="padding: 1rem; margin-top: 2rem;"><button id="logout-btn" class="btn btn-outline" style="width: 100%; border-color: rgba(255,255,255,0.2); color: white;">Logout</button></div>
        </aside>

        <main class="main-content">
            <div class="page-header"><h2>Dashboard</h2><p>System overview and quick actions</p></div>
            <div class="kpi-grid" id="kpi-grid"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                <div class="card"><h3 class="card-title">Train Model</h3><p style="color: #666; margin-bottom: 1rem;">Retrain the CTGAN model with new data.</p><a href="admin_model.html" class="btn btn-primary" style="text-decoration: none; text-align: center;">Go</a></div>
                <div class="card"><h3 class="card-title">Data Validation</h3><p style="color: #666; margin-bottom: 1rem;">Compare real vs synthetic data quality.</p><a href="admin_validation.html" class="btn btn-primary" style="text-decoration: none; text-align: center;">Go</a></div>
                <div class="card"><h3 class="card-title">Manage Users</h3><p style="color: #666; margin-bottom: 1rem;">View and manage all platform users.</p><a href="admin_users.html" class="btn btn-primary" style="text-decoration: none; text-align: center;">Go</a></div>
            </div>
        </main>
    </div>
    <script src="../js/services/auth.js"></script>
    <script src="../js/services/history.js"></script>
    <script src="../js/services/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        (function() {
            var logoutBtn = document.getElementById('logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() {
                    try { AuthService.logout(); } catch (e) { sessionStorage.clear(); }
                    window.location.href = '/pages/login.html';
                });
            }
        })();

        document.addEventListener('DOMContentLoaded', function() {
            try {
                var user = AuthService.getCurrentUser();
                if (!user || user.role !== 'admin') { window.location.href = '/pages/login.html'; return; }
            } catch (e) { window.location.href = '/pages/login.html'; return; }

            try { App.setupSidebar(); } catch (e) {}
            try { App.setupUserPanel(); } catch (e) {}

            var users = [], stats = { total: 0, total_rows: 0 }, totalPreds = 0;
            try { users = AuthService.getUsers() || []; } catch (e) { users = []; }
            try { stats = DataService.getGenerationStats() || { total: 0, total_rows: 0 }; } catch (e) {}

            if (users.length > 0) {
                try {
                    totalPreds = users.reduce(function(s, u) {
                        try { return s + (HistoryService.getStats(u.id).totalPredictions || 0); } catch (e) { return s; }
                    }, 0);
                } catch (e) {}
            }

            document.getElementById('kpi-grid').innerHTML =
                '<div class="kpi-card"><div class="kpi-value">' + (users.length || 0) + '</div><div class="kpi-label">Users</div></div>' +
                '<div class="kpi-card"><div class="kpi-value">' + (totalPreds || 0) + '</div><div class="kpi-label">Predictions</div></div>' +
                '<div class="kpi-card"><div class="kpi-value">' + (stats.total || 0) + '</div><div class="kpi-label">Datasets</div></div>' +
                '<div class="kpi-card"><div class="kpi-value">' + ((stats.total_rows || 0).toLocaleString()) + '</div><div class="kpi-label">Total Rows</div></div>';
        });
    </script>
</body>
</html>
