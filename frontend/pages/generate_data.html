<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthAI - Generate Data</title>
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        .generation-form { max-width: 600px; }
        .level-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .level-card { background: #fff; border: 2px solid #E0E0E0; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .level-card:hover { border-color: #66BB6A; }
        .level-card.selected { border-color: #2E7D32; background: #E8F5E9; }
        .level-card.disabled { opacity: 0.5; cursor: not-allowed; }
        .level-card .level-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .level-card .level-name { font-weight: 700; color: #1B5E20; }
        .level-card .level-size { color: #666; font-size: 0.85rem; }
        .level-card .level-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 600; margin-top: 0.5rem; }
        .type-select { display: flex; gap: 0.5rem; margin: 1rem 0; }
        .type-btn { flex: 1; padding: 0.75rem; border: 2px solid #E0E0E0; border-radius: 8px; background: white; text-align: center; cursor: pointer; transition: all 0.2s; }
        .type-btn.selected { border-color: #2E7D32; background: #E8F5E9; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand"><h1>SynthAI</h1><p>Smart Agricultural Intelligence</p></div>
            <div id="user-panel"></div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div style="padding: 1rem; margin-top: 2rem;"><button id="logout-btn" class="btn btn-outline" style="width: 100%; border-color: rgba(255,255,255,0.2); color: white;">Logout</button></div>
        </aside>

        <main class="main-content">
            <div class="page-header"><h2>Generate Synthetic Data</h2><p>Configure parameters and generate agricultural datasets</p></div>

            <div id="status-msg"></div>

            <div class="card">
                <h3 class="card-title">1. Select Dataset Type</h3>
                <div class="type-select" id="type-select">
                    <div class="type-btn selected" data-type="crop"><strong>Crop</strong><br><span style="font-size: 0.8rem; color: #666;">Agricultural data</span></div>
                    <div class="type-btn" data-type="soil"><strong>Soil</strong><br><span style="font-size: 0.8rem; color: #666;">Soil composition</span></div>
                    <div class="type-btn" data-type="weather"><strong>Weather</strong><br><span style="font-size: 0.8rem; color: #666;">Climate data</span></div>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title">2. Select Generation Level</h3>
                <div class="level-cards" id="level-cards"></div>
            </div>

            <button id="generate-btn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Generate Dataset</button>
        </main>
    </div>

    <script src="../js/services/auth.js"></script>
    <script src="../js/services/payment.js"></script>
    <script src="../js/services/data.js"></script>
    <script src="../js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = AuthService.getCurrentUser();
            if (!user) { window.location.href = 'login.html'; return; }
            AuthService.syncSessionFromStorage();
            App.setupSidebar(); App.setupUserPanel(); App.setupLogout();

            let selectedType = 'crop';
            let selectedLevel = 'medium';
            const availableLevels = DataService.getAvailableLevels(user.id);
            const plan = PaymentService.getUserPlan(user.id);

            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedType = btn.dataset.type;
                });
            });

            const cardsContainer = document.getElementById('level-cards');
            const levels = [
                { id: 'medium', name: 'Medium', rows: 1000, desc: '1,000 rows', badge: 'free', badgeClass: 'badge-free' },
                { id: 'large', name: 'Large', rows: 10000, desc: '10,000 rows', badge: 'Pro', badgeClass: 'badge-warning' },
                { id: 'bigdata', name: 'Big Data', rows: 100000, desc: '100,000 rows', badge: 'Premium', badgeClass: 'badge-premium' }
            ];

            cardsContainer.innerHTML = levels.map(l => {
                const available = availableLevels.includes(l.id);
                const isSelected = l.id === selectedLevel;
                return '<div class="level-card' + (isSelected ? ' selected' : '') + (!available ? ' disabled' : '') + '" data-level="' + l.id + '">' +
                    '<div class="level-name">' + l.name + '</div>' +
                    '<div class="level-size">' + l.desc + '</div>' +
                    '<span class="level-badge ' + l.badgeClass + '">' + l.badge + '</span>' +
                    (!available ? '<div style="font-size: 0.75rem; color: #999; margin-top: 0.5rem;">Upgrade to access</div>' : '') +
                    '</div>';
            }).join('');

            document.querySelectorAll('.level-card:not(.disabled)').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.level-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    selectedLevel = card.dataset.level;
                });
            });

            document.getElementById('generate-btn').addEventListener('click', () => {
                if (!DataService.canGenerate(user.id, selectedLevel)) {
                    document.getElementById('status-msg').innerHTML = '<div class="status-message status-error">This level requires an upgrade. <a href="subscription.html">Upgrade now</a></div>';
                    return;
                }

                const config = DataService.getDatasetConfig(selectedLevel);
                document.getElementById('generate-btn').disabled = true;
                document.getElementById('generate-btn').textContent = 'Generating...';

                setTimeout(() => {
                    const preview = DataService.generatePreview(selectedType, selectedLevel);
                    const validation = preview.validation || { qualityScore: 0, passed: false, similarityPct: 0 };
                    const entry = DataService.addGeneration({ userId: user.id, rows: config.rows, type: selectedType, level: config.label, preview });
                    document.getElementById('generate-btn').disabled = false;
                    document.getElementById('generate-btn').textContent = 'Generate Dataset';
                    const qualityBadge = validation.qualityScore >= 90 ? 'badge-success' : validation.qualityScore >= 70 ? 'badge-warning' : 'badge-danger';
                    document.getElementById('status-msg').innerHTML = '<div class="status-message status-success">' +
                        '<strong>Dataset generated successfully!</strong><br>' +
                        '<span style="font-size:0.85rem;">Type: ' + selectedType.charAt(0).toUpperCase() + selectedType.slice(1) +
                        ' | Level: ' + config.label +
                        ' | Quality: <span class="badge ' + qualityBadge + '">' + validation.qualityScore + '%</span>' +
                        ' | Similarity: ' + validation.similarityPct + '%</span>' +
                        ' <a href="dataset_viewer.html?id=' + entry.id + '" class="btn btn-primary" style="margin-left: 0.5rem;">View Dataset</a></div>';
                }, 1200);
            });
        });
    </script>
</body>
</html>
