<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynthAI - Generate Data</title>
    <link rel="stylesheet" href="../styles/global.css">
    <style>
        .generation-form { max-width: 600px; }
        .level-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 1.5rem 0; }
        .level-card { background: #fff; border: 2px solid #E0E0E0; border-radius: 12px; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .level-card:hover { border-color: #66BB6A; }
        .level-card.selected { border-color: #2E7D32; background: #E8F5E9; }
        .level-card.disabled { opacity: 0.5; cursor: not-allowed; }
        .level-card .level-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .level-card .level-name { font-weight: 700; color: #1B5E20; }
        .level-card .level-size { color: #666; font-size: 0.85rem; }
        .level-card .level-badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 1rem; font-size: 0.7rem; font-weight: 600; margin-top: 0.5rem; }
        .type-select { display: flex; gap: 0.5rem; margin: 1rem 0; }
        .type-btn { flex: 1; padding: 0.75rem; border: 2px solid #E0E0E0; border-radius: 8px; background: white; text-align: center; cursor: pointer; transition: all 0.2s; }
        .type-btn.selected { border-color: #2E7D32; background: #E8F5E9; }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-brand"><h1>SynthAI</h1><p>Smart Agricultural Intelligence</p></div>
            <div id="user-panel"></div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
            <div style="padding: 1rem; margin-top: 2rem;"><button id="logout-btn" class="btn btn-outline" style="width: 100%; border-color: rgba(255,255,255,0.2); color: white;">Logout</button></div>
        </aside>

        <main class="main-content">
            <div class="page-header"><h2>Generate Synthetic Data</h2><p>Configure parameters and generate agricultural datasets</p></div>

            <div id="status-msg"></div>

            <div class="card">
                <h3 class="card-title">1. Select Generation Level</h3>
                <div class="level-cards" id="level-cards"></div>
            </div>

            <button id="generate-btn" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Generate Dataset</button>
        </main>
    </div>

    <script src="../js/services/auth.js"></script>
    <script src="../js/services/payment.js"></script>
    <script src="../js/services/data.js"></script>
    <script src="../js/services/history.js"></script>
    <script src="../js/services/api.js"></script>
    <script src="../js/app.js"></script>
    <script>
        (function() {
            var btn = document.getElementById('logout-btn');
            if (btn) {
                btn.addEventListener('click', function() {
                    try { AuthService.logout(); } catch (e) { sessionStorage.clear(); }
                    window.location.href = '/pages/login.html';
                });
            }
        })();

        document.addEventListener('DOMContentLoaded', function() {
            try {
                var user = AuthService.getCurrentUser();
                if (!user) { window.location.href = '/pages/login.html'; return; }
            } catch (e) { window.location.href = '/pages/login.html'; return; }

            try { App.setupSidebar(); } catch (e) {}
            try { App.setupUserPanel(); } catch (e) {}

            try { AuthService.syncSessionFromStorage(); } catch (e) {}

            var user = AuthService.getCurrentUser();
            if (!user) { window.location.href = '/pages/login.html'; return; }

            var selectedType = 'crop';
            var selectedLevel = 'medium';
            var availableLevels = [];

            try { availableLevels = DataService.getAvailableLevels(user.id) || []; } catch (e) { availableLevels = ['medium']; }

            var cardsContainer = document.getElementById('level-cards');
            var levels = [
                { id: 'medium', name: 'Medium', rows: 1000, desc: '1,000 rows', badge: 'free', badgeClass: 'badge-free' },
                { id: 'large', name: 'Large', rows: 10000, desc: '10,000 rows', badge: 'Pro', badgeClass: 'badge-warning' },
                { id: 'bigdata', name: 'Big Data', rows: 100000, desc: '100,000 rows', badge: 'Premium', badgeClass: 'badge-premium' }
            ];

            cardsContainer.innerHTML = levels.map(function(l) {
                var available = false;
                try { available = availableLevels.indexOf(l.id) !== -1; } catch (e) {}
                var isSelected = l.id === selectedLevel;
                return '<div class="level-card' + (isSelected ? ' selected' : '') + (!available ? ' disabled' : '') + '" data-level="' + l.id + '">' +
                    '<div class="level-name">' + l.name + '</div>' +
                    '<div class="level-size">' + l.desc + '</div>' +
                    '<span class="level-badge ' + l.badgeClass + '">' + l.badge + '</span>' +
                    (!available ? '<div style="font-size: 0.75rem; color: #999; margin-top: 0.5rem;">Upgrade to access</div>' : '') +
                    '</div>';
            }).join('');

            document.querySelectorAll('.level-card:not(.disabled)').forEach(function(card) {
                card.addEventListener('click', function() {
                    document.querySelectorAll('.level-card').forEach(function(c) { c.classList.remove('selected'); });
                    card.classList.add('selected');
                    selectedLevel = card.dataset.level;
                });
            });

            document.getElementById('generate-btn').addEventListener('click', function() {
                var canGen = false;
                try { canGen = DataService.canGenerate(user.id, selectedLevel); } catch (e) {}
                if (!canGen) {
                    document.getElementById('status-msg').innerHTML = '<div class="status-message status-error">This level requires an upgrade. <a href="subscription.html">Upgrade now</a></div>';
                    return;
                }

                var config = null;
                try { config = DataService.getDatasetConfig(selectedLevel); } catch (e) {}
                if (!config) {
                    document.getElementById('status-msg').innerHTML = '<div class="status-message status-error">Invalid dataset configuration</div>';
                    return;
                }

                var btn = document.getElementById('generate-btn');
                btn.disabled = true;
                btn.textContent = 'Generating...';

                // Try API first
                var apiAvail = null;
                try { apiAvail = ApiService && ApiService.isAvailable(); } catch (e) {}

                if (apiAvail === true) {
                    ApiService.generateData(config.rows).then(function(result) {
                        var preview = {
                            headers: result.columns || [],
                            data: result.preview || [],
                            totalRows: result.num_rows,
                            type: selectedType,
                            level: config.label,
                            validation: null,
                            generatedAt: result.generated_at || new Date().toISOString()
                        };
                        // Compute validation on preview
                        try { preview.validation = DataService.validatePreview(preview); } catch (e) {}

                    var entry = null;
                    try { entry = DataService.addGeneration({ userId: user.id, rows: config.rows, type: selectedType, level: config.label, preview: preview }); } catch (e) {}

                        // Save to history with validation
                        try {
                            var val = preview.validation || {};
                            HistoryService.addEntry({
                                userId: user.id, type: 'data_generation',
                                input: JSON.stringify({ type: selectedType, level: config.label, rows: config.rows }),
                                result: JSON.stringify({
                                    type: selectedType, level: config.label, rows: config.rows,
                                    qualityScore: val.qualityScore, similarityPct: val.similarityPct,
                                    passed: val.passed, checksPassed: val.passedCount || 0, checksTotal: val.totalChecks || 0
                                }),
                                validation: val
                            });
                        } catch (e) {}

                        btn.disabled = false;
                        btn.textContent = 'Generate Dataset';

                        var quality = (preview.validation && preview.validation.qualityScore) || 85;
                        var qualityBadge = quality >= 90 ? 'badge-success' : quality >= 70 ? 'badge-warning' : 'badge-danger';
                        document.getElementById('status-msg').innerHTML =
                            '<div class="status-message status-success">' +
                            '<strong>Dataset generated successfully! (CTGAN Backend)</strong><br>' +
                            '<span style="font-size:0.85rem;">Type: ' + selectedType.charAt(0).toUpperCase() + selectedType.slice(1) +
                            ' | Level: ' + config.label +
                            ' | Quality: <span class="badge ' + qualityBadge + '">' + quality + '%</span>' +
                            ' | Rows: ' + result.num_rows +
                            ' | Similarity: ' + ((result.similarity_scores && result.similarity_scores.overall) ? Math.round(result.similarity_scores.overall) : 'N/A') + '%' +
                            '</span></div>';
                    }).catch(function(err) {
                        // API failed, fall back to JS simulation
                        doJsGeneration(config);
                    });
                } else {
                    setTimeout(function() { doJsGeneration(config); }, 1200);
                }

                function doJsGeneration(config) {
                    var preview = null;
                    try {
                        preview = DataService.generatePreview(selectedType, selectedLevel);
                    } catch (e) {
                        btn.disabled = false;
                        btn.textContent = 'Generate Dataset';
                        document.getElementById('status-msg').innerHTML = '<div class="status-message status-error">Generation failed: ' + (e.message || 'Unknown error') + '</div>';
                        return;
                    }

                    var validation = (preview && preview.validation) || { qualityScore: 0, passed: false, similarityPct: 0 };

                    var entry = null;
                    try { entry = DataService.addGeneration({ userId: user.id, rows: config.rows, type: selectedType, level: config.label, preview: preview }); } catch (e) {}

                    btn.disabled = false;
                    btn.textContent = 'Generate Dataset';

                    var qualityBadge = validation.qualityScore >= 90 ? 'badge-success' : validation.qualityScore >= 70 ? 'badge-warning' : 'badge-danger';
                    document.getElementById('status-msg').innerHTML =
                        '<div class="status-message status-success">' +
                        '<strong>Dataset generated successfully!</strong><br>' +
                        '<span style="font-size:0.85rem;">Type: ' + selectedType.charAt(0).toUpperCase() + selectedType.slice(1) +
                        ' | Level: ' + config.label +
                        ' | Quality: <span class="badge ' + qualityBadge + '">' + validation.qualityScore + '%</span>' +
                        ' | Similarity: ' + validation.similarityPct + '%</span>' +
                        ' <a href="dataset_viewer.html?id=' + ((entry && entry.id) || '') + '" class="btn btn-primary" style="margin-left: 0.5rem;">View Dataset</a></div>';
                }
            });
        });
    </script>
</body>
</html>
